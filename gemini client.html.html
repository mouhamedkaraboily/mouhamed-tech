<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOUHAMED TECH — File d'Attente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --bg: #071126; --card-bg: #0d1e3d; --blue: #0a7cff; --accent: #00e5ff; --green: #00d97e; --white: #ffffff; --gray: #6b7c9a; --red: #ff3b30; --dark-gray: #162a4a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--white); padding: 20px; min-height: 100vh; }
        header { text-align: center; padding: 10px 0 20px; }
        header h1 { font-size: 32px; font-weight: 900; }
        header h1 span { color: var(--accent); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 900px) { .grid-layout { grid-template-columns: 1fr 2fr; } }
        
        .panel { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid rgba(0,229,255,0.1); height: fit-content; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: var(--gray); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; font-size: 15px; background: rgba(7,17,38,0.5); color: #fff; outline: none; transition: all 0.3s ease; }
        .form-group input:focus { border-color: var(--blue); background: var(--dark-gray); }
        
        .btn-ticket { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--blue), #0056cc); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(10,124,255,0.2); }
        .btn-ticket:disabled { background: var(--gray); cursor: not-allowed; opacity: 0.5; box-shadow: none; }
        
        /* BOUTON ROUGE ET FIXE */
        .btn-cancel { background: var(--red) !important; color: white !important; font-size: 16px; font-weight: 900; padding: 14px; border: none; border-radius: 12px; cursor: pointer; margin-top: 15px; width: 100%; display: none; text-transform: uppercase; }
        .btn-confirm-presence { background: var(--green) !important; color: #071126 !important; font-size: 16px; font-weight: 900; padding: 14px; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; width: 100%; display: none; text-transform: uppercase; }
        
        .your-ticket-box { background: var(--white); color: #000; padding: 25px; border-radius: 20px; text-align: center; margin-top: 25px; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .your-ticket-box .ticket-title { font-weight: 900; font-size: 18px; color: #071126; }
        .your-ticket-number { font-size: 64px; font-weight: 900; color: var(--blue); margin: 10px 0; line-height: 1; }
        .your-ticket-name { font-size: 18px; font-weight: 700; color: #1e293b; }
        .your-ticket-whatsapp { font-size: 14px; color: #64748b; margin-top: 4px; font-weight: 600; }
        .your-ticket-date { font-size: 13px; color: #475569; margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 12px; font-weight: 700; text-transform: capitalize; background: #f8fafc; padding: 10px; border-radius: 8px; }
        .qr-container { display: flex; justify-content: center; margin: 15px auto 0; padding: 8px; background: white; border-radius: 12px; width: fit-content; border: 1px solid #e2e8f0; }
        
        .display-board { display: flex; flex-direction: column; gap: 20px; }
        .calling-now { background: linear-gradient(135deg, #0a7cff 0%, #00e5ff 100%); padding: 30px; border-radius: 24px; text-align: center; box-shadow: 0 15px 30px rgba(10,124,255,0.2); }
        .calling-number { font-size: 72px; font-weight: 900; }
        
        .counters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; }
        .counter-card { background: var(--card-bg); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .counter-card.calling { border-color: var(--green); background: rgba(0, 217, 126, 0.08); animation: pulseBorder 1.5s infinite alternate; }
        
        .waiting-list-section { background: var(--card-bg); border-radius: 24px; padding: 25px; }
        .waiting-tokens { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        .token { background: rgba(255,255,255,0.05); padding: 10px 18px; border-radius: 12px; font-size: 15px; font-weight: 700; color: var(--accent); }
        .limit-alert { background: rgba(255,59,48,0.1); border: 1px solid var(--red); color: var(--red); padding: 12px; border-radius: 12px; font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }
        
        .btn-reset-form { width: 100%; padding: 12px; background: rgba(7,17,38,0.4); color: var(--gray); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 15px; display: none; }

        @keyframes pulseBorder { 0% { box-shadow: 0 0 5px rgba(0,217,126,0.2); } 100% { box-shadow: 0 0 20px rgba(0,217,126,0.6); } }
    </style>
</head>
<body>

<header>
    <h1>MOUHAMED<span>TECH</span> — File d'Attente</h1>
</header>

<div class="grid-layout">
    <div class="panel">
        <div id="formSection">
            <div style="font-size:18px; font-weight:800; margin-bottom:20px;">🎟️ Prendre un Ticket</div>
            <div class="limit-alert" id="limitAlert">⚠️ Limite quotidienne atteinte pour aujourd'hui.</div>
            <form id="ticketForm" onsubmit="genererTicket(event)">
                <div class="form-group">
                    <label>Nom complet du Patient</label>
                    <input type="text" id="clientName" placeholder="Ex: Mouhamed Karaboily" required>
                </div>
                <div class="form-group">
                    <label>Numéro WhatsApp</label>
                    <input type="tel" id="clientWhatsapp" placeholder="Ex: +225 XX XX XX XX" required>
                </div>
                <button type="submit" id="btnSubmitTicket" class="btn-ticket">Prendre un Ticket</button>
            </form>
        </div>

        <div class="your-ticket-box" id="ticketResult">
            <div class="ticket-title">MOUHAMED TECH</div>
            <div style="color: #64748b; font-size: 12px; font-weight: 600; margin-top: 5px;">VOTRE NUMÉRO DE PASSAGE</div>
            <div class="your-ticket-number" id="lblMyTicket">--</div>
            <div class="your-ticket-name" id="lblMyName">--</div>
            <div class="your-ticket-whatsapp" id="lblMyWhatsapp">--</div>
            <div class="your-ticket-date" id="lblMyDate">--</div>
            <div class="qr-container" id="qrcode"></div>
        </div>
        
        <!-- BOUTONS DE CONTRÔLE SÉPARÉS -->
        <button class="btn-cancel" id="btnCancelPresence" onclick="annulerPresence()">❌ Annule ma présence</button>
        <button class="btn-confirm-presence" id="btnConfirmPresence" onclick="confirmerArrivee()">✅ Confirmer ma présence au Guichet</button>
        <button class="btn-reset-form" id="btnResetForm" onclick="retourFormulaire()">Prendre un autre ticket</button>
    </div>

    <div class="display-board">
        <div class="calling-now" id="mainCallBox" style="display: none;">
            <div style="text-transform:uppercase; font-size:12px; font-weight: 800; letter-spacing: 2px;">Appel en cours</div>
            <div class="calling-number" id="mainCallTicket">T-000</div>
            <div id="mainCallPatient" style="font-size:24px; font-weight:600; margin: 5px 0;">Patient: --</div>
            <div id="mainCallCounter" style="font-size:18px; font-weight:800; color:var(--bg); background: var(--accent); display: inline-block; padding: 4px 15px; border-radius: 20px;">Guichet --</div>
        </div>
        
        <div class="counters-grid" id="countersContainer"></div>
        
        <div class="waiting-list-section">
            <div style="font-size:13px; color:var(--gray); text-transform:uppercase; font-weight:800;" id="lblTicketsStats">En attente (0/-- )</div>
            <div class="waiting-tokens" id="waitingTokensBox"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfX2hJEV035PT7F2mxQ0_gNEzON-nCXoM",
        authDomain: "mouhamed-tech-database.firebaseapp.com",
        databaseURL: "https://mouhamed-tech-database-default-rtdb.firebaseio.com",
        projectId: "mouhamed-tech-database",
        storageBucket: "mouhamed-tech-database.firebasestorage.app",
        messagingSenderId: "178632163158",
        appId: "1:178632163158:web:6b48bcfb12e1c37fe3e0f7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getTodayDateStr() {
        const d = new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    }
    
    const dStr = getTodayDateStr();
    let totalTicketsCree = 0;
    let limiteTickets = 50;
    let monNumeroAffiche = null;
    let ticketCleCourante = null;

    db.ref('file_attente/config_global/limite_globale').on('value', snap => {
        if(snap.exists()) { limiteTickets = parseInt(snap.val()); }
        verifierLimite();
    });

    db.ref('file_attente/guichets').on('value', snapshot => {
        const data = snapshot.val() || {};
        const conteneur = document.getElementById("countersContainer");
        conteneur.innerHTML = "";
        
        let ticketAppeleEnCeMoment = null;
        let numGuichetAppelant = 0;
        
        for(let i=1; i<=5; i++) {
            let g = data[`guichet_${i}`] || { statut: "Libre", ticket: "Libre" };
            let cl = (g.statut === "Appel en cours" || g.statut === "Patient Présent" || g.statut === "En pause") ? "calling" : "";
            let affichageTicket = (g.ticket === "Libre" || g.statut === "Occupé" || g.statut === "Libre" || g.statut === "En pause") ? "Libre" : g.ticket;
            let texteStatut = g.statut;
            if(g.statut === "En pause") { affichageTicket = "❌"; texteStatut = "Fermé / Pause"; }
            
            conteneur.innerHTML += `<div class="counter-card ${cl}"><div>GUICHET 0${i}</div><div style="font-size:24px; font-weight:900; margin-top:5px; color:${affichageTicket !== 'Libre' ? 'var(--accent)' : 'var(--white)'}">${affichageTicket}</div><div style="font-size:11px; color:var(--gray); margin-top:3px;">${texteStatut}</div></div>`;
            
            if(g.statut === "Appel en cours") { 
                ticketAppeleEnCeMoment = g.ticket; 
                numGuichetAppelant = i;
            }
        }

        if(ticketAppeleEnCeMoment && ticketAppeleEnCeMoment !== "Libre") {
            document.getElementById("mainCallTicket").textContent = ticketAppeleEnCeMoment;
            document.getElementById("mainCallBox").style.display = "block";
            
            db.ref(`file_attente/historique_jours/${dStr}/tickets`).orderByChild('numero').equalTo(ticketAppeleEnCeMoment).once('value', snap => {
                let nom = "Inconnu";
                snap.forEach(c => { nom = c.val().nom; });
                document.getElementById("mainCallPatient").textContent = `Patient: ${nom}`;
                document.getElementById("mainCallCounter").textContent = `Guichet 0${numGuichetAppelant}`;
            });
        } else {
            document.getElementById("mainCallBox").style.display = "none";
        }
    });

    db.ref(`file_attente/historique_jours/${dStr}/tickets`).on('value', snap => {
        totalTicketsCree = snap.numChildren();
        let tokens = [];
        snap.forEach(c => { 
            if(c.val().statut === "En attente") tokens.push(c.val().numero); 
        });
        
        document.getElementById("lblTicketsStats").textContent = `En attente (${totalTicketsCree}/${limiteTickets})`;
        const box = document.getElementById("waitingTokensBox");
        box.innerHTML = tokens.length ? "" : "Aucun patient pour aujourd'hui";
        tokens.forEach(t => box.innerHTML += `<div class="token">${t}</div>`);
        
        verifierLimite();
    });

    function verifierLimite() {
        const formBtn = document.getElementById("btnSubmitTicket");
        const alertBox = document.getElementById("limitAlert");
        if(totalTicketsCree >= limiteTickets) {
            formBtn.disabled = true; alertBox.style.display = "block";
        } else {
            formBtn.disabled = false; alertBox.style.display = "none";
        }
    }

    function genererTicket(e) {
        e.preventDefault();
        if(totalTicketsCree >= limiteTickets) return;
        
        const nom = document.getElementById("clientName").value.trim();
        const whatsapp = document.getElementById("clientWhatsapp").value.trim();
        
        const d = new Date();
        const heureArrivee = String(d.getHours()).padStart(2, '0') + "h" + String(d.getMinutes()).padStart(2, '0');

        const compteurRef = db.ref(`file_attente/historique_jours/${dStr}/compteur`);
        compteurRef.transaction(currentValue => {
            return (currentValue || 0) + 1;
        }, (error, committed, snapshot) => {
            if (committed) {
                const nouveauNumero = snapshot.val();
                monNumeroAffiche = "T-" + String(nouveauNumero).padStart(3, '0');

                const structureTicket = {
                    numero: monNumeroAffiche,
                    nom: nom,
                    whatsapp: whatsapp,
                    statut: "En attente",
                    heure_arrivee: heureArrivee,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };

                db.ref(`file_attente/historique_jours/${dStr}/tickets`).push(structureTicket).then(res => {
                    ticketCleCourante = res.key;
                    
                    document.getElementById("formSection").style.display = "none";
                    document.getElementById("ticketResult").style.display = "block";
                    document.getElementById("btnCancelPresence").style.display = "block";
                    document.getElementById("btnResetForm").style.display = "block";
                    
                    document.getElementById("lblMyTicket").textContent = monNumeroAffiche;
                    document.getElementById("lblMyName").textContent = nom;
                    document.getElementById("lblMyWhatsapp").textContent = "WhatsApp : " + whatsapp;
                    
                    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                    const dateLegible = d.toLocaleDateString('fr-FR', options);
                    document.getElementById("lblMyDate").textContent = `📆 ${dateLegible} à ${heureArrivee}`;
                    
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { 
                        text: "MOUHAMED TECH\nTicket: " + monNumeroAffiche + "\nPatient: " + nom + "\nWA: " + whatsapp, 
                        width: 120, 
                        height: 120 
                    });
                    
                    db.ref(`file_attente/historique_jours/${dStr}/tickets/${ticketCleCourante}/statut`).on('value', s => {
                        const currentStatus = s.val();
                        if(currentStatus === "Appelé") {
                            document.getElementById("btnConfirmPresence").style.display = "block";
                        } else if(currentStatus === "Patient Présent" || currentStatus === "Confirmé" || currentStatus === "Terminé" || currentStatus === "Absent") {
                            document.getElementById("btnConfirmPresence").style.display = "none";
                            document.getElementById("btnCancelPresence").style.display = "none";
                        }
                    });
                });
            }
        });
    }

    function confirmerArrivee() {
        if(ticketCleCourante) {
            db.ref(`file_attente/historique_jours/${dStr}/tickets/${ticketCleCourante}`).update({ statut: "Confirmé" });
            db.ref(`file_attente/historique_jours/${dStr}/tickets/${ticketCleCourante}`).once('value', s => {
                let g = s.val().guichet;
                if(g) db.ref(`file_attente/guichets/guichet_${g}`).update({ statut: "Patient Présent" });
            });
            document.getElementById("btnConfirmPresence").style.display = "none";
        }
    }

    function annulerPresence() {
        if(ticketCleCourante && confirm("Voulez-vous vraiment annuler votre ticket ?")) {
            db.ref(`file_attente/historique_jours/${dStr}/tickets/${ticketCleCourante}`).update({ statut: "Terminé" });
            retourFormulaire();
        }
    }

    function retourFormulaire() {
        document.getElementById("clientName").value = "";
        document.getElementById("clientWhatsapp").value = "";
        document.getElementById("ticketResult").style.display = "none";
        document.getElementById("btnConfirmPresence").style.display = "none";
        document.getElementById("btnCancelPresence").style.display = "none";
        document.getElementById("btnResetForm").style.display = "none";
        document.getElementById("formSection").style.display = "block";
    }
</script>
</body>
</html>
