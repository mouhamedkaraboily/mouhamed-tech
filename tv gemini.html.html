<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOUHAMED TECH — Écran Salle d'Attente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --bg: #030a16; 
            --card-bg: #0a1526; 
            --blue: #0a7cff; 
            --accent: #00e5ff; 
            --green: #00d97e; 
            --white: #ffffff; 
            --gray: #475569; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 25px; }

        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.05); }
        header h1 { font-size: 38px; font-weight: 900; letter-spacing: 1px; }
        header h1 span { color: var(--accent); }
        .live-clock { font-size: 26px; font-weight: 800; color: var(--accent); background: rgba(0,229,255,0.07); padding: 8px 22px; border-radius: 12px; text-transform: capitalize; }

        .tv-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; flex: 1; margin-top: 25px; min-height: 0; }

        .main-call-zone { background: linear-gradient(145deg, #0a7cff 0%, #0056cc 100%); border-radius: 32px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-shadow: 0 20px 50px rgba(10,124,255,0.3); position: relative; animation: pulseGlow 3s infinite alternate; }
        .main-call-zone.empty { background: var(--card-bg); box-shadow: none; animation: none; border: 2px dashed rgba(255,255,255,0.1); }
        .badge-status { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .main-ticket { font-size: 140px; font-weight: 900; line-height: 1; color: var(--white); margin-bottom: 10px; text-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .main-patient { font-size: 52px; font-weight: 800; color: var(--accent); margin-bottom: 20px; }
        .main-guichet { font-size: 32px; font-weight: 900; background: var(--white); color: #0056cc; padding: 10px 40px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .side-zone { display: flex; flex-direction: column; gap: 20px; min-height: 0; }
        .section-title { font-size: 18px; font-weight: 800; text-transform: uppercase; color: var(--gray); letter-spacing: 2px; }
        .counters-list { display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto; }
        
        .counter-row { background: var(--card-bg); padding: 20px 30px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .counter-row.active { border-color: var(--green); background: rgba(0, 217, 126, 0.04); }
        .counter-name { font-size: 24px; font-weight: 800; }
        .counter-ticket { font-size: 38px; font-weight: 900; color: var(--accent); }
        .counter-status { font-size: 16px; font-weight: 600; color: var(--gray); text-transform: uppercase; }
        .counter-row.active .counter-status { color: var(--green); }

        .audio-lock-screen { position: fixed; inset: 0; background: rgba(3,10,22,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .audio-btn { background: var(--blue); color: white; border: none; padding: 20px 40px; font-size: 22px; font-weight: 800; border-radius: 16px; cursor: pointer; box-shadow: 0 10px 30px rgba(10,124,255,0.4); margin-top: 20px; }

        @keyframes pulseGlow {
            0% { box-shadow: 0 20px 40px rgba(10,124,255,0.2); }
            100% { box-shadow: 0 20px 60px rgba(0,229,255,0.4); }
        }
    </style>
</head>
<body>

<div class="audio-lock-screen" id="audioLock">
    <h2 style="font-size: 36px; font-weight: 900;">MOUHAMED TECH</h2>
    <p style="color: #6b7c9a; margin-top: 10px; font-size: 18px;">Cliquez pour activer les annonces vocales automatiques de la salle d'attente.</p>
    <button class="audio-btn" onclick="activerAudioTV()">📺 Activer les Haut-Parleurs</button>
</div>

<header>
    <h1>MOUHAMED<span>TECH</span></h1>
    <div class="live-clock" id="liveClock">Chargement du calendrier...</div>
</header>

<div class="tv-layout">
    <div class="main-call-zone empty" id="tvCallZone">
        <div id="tvCallContent" style="display: none; width: 100%;">
            <div class="badge-status">Appel en cours</div>
            <div class="main-ticket" id="tvTicketNum">--</div>
            <div class="main-patient" id="tvPatientName">Patient: --</div>
            <div>
                <span class="main-guichet" id="tvCounterNum">Guichet --</span>
            </div>
        </div>
        <div id="tvCallPlaceholder" style="font-size: 28px; font-weight: 700; color: var(--gray);">
            Aucun appel en cours. Veuillez patienter.
        </div>
    </div>

    <div class="side-zone">
        <div class="section-title">État des guichets</div>
        <div class="counters-list" id="tvCountersList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfX2hJEV035PT7F2mxQ0_gNEzON-nCXoM",
        authDomain: "mouhamed-tech-database.firebaseapp.com",
        databaseURL: "https://mouhamed-tech-database-default-rtdb.firebaseio.com",
        projectId: "mouhamed-tech-database",
        storageBucket: "mouhamed-tech-database.firebasestorage.app",
        messagingSenderId: "178632163158",
        appId: "1:178632163158:web:6b48bcfb12e1c37fe3e0f7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function updateClock() {
        const d = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('liveClock').textContent = `${d.toLocaleDateString('fr-FR', options)} — ${d.toLocaleTimeString('fr-FR')}`;
    }
    setInterval(updateClock, 1000);

    function getTodayDateStr() {
        const d = new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    }

    const dStr = getTodayDateStr();
    
    // CORRECTION : On suit les jetons d'appels indépendamment pour CHAQUE guichet
    let derniersIdAppelsParGuichet = { 1: "", 2: "", 3: "", 4: "", 5: "" };

    function activerAudioTV() {
        document.getElementById("audioLock").style.display = "none";
        updateClock();
        initialiserAbonnements();
    }

    function emettreBipDONG() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(580, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } catch(e) {}
    }

    function annoncerAuHautParleur(ticket, nom, guichet) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let numeroParle = ticket.replace('-', ' ').split('').join(' ');
            let texte = `Le numéro ${numeroParle}, ${nom}, est attendu au guichet ${guichet}`;
            let utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang = 'fr-FR';
            utterance.rate = 0.82; 
            window.speechSynthesis.speak(utterance);
        }
    }

    function initialiserAbonnements() {
        db.ref('file_attente/guichets').on('value', snapshot => {
            const data = snapshot.val() || {};
            const conteneurTv = document.getElementById("tvCountersList");
            conteneurTv.innerHTML = "";

            let guichetPrioritaireId = null;
            let ticketPrioritaireNum = null;

            // 1. Analyse en temps réel des guichets et détection de TOUS les appels lancés
            for(let i = 1; i <= 5; i++) {
                let g = data[`guichet_${i}`] || { statut: "Libre", ticket: "Libre" };
                let ticketAffichage = (g.ticket === "Libre" || g.statut === "Libre" || g.statut === "Occupé") ? "—" : g.ticket;
                let classeActive = (g.statut === "Appel en cours" || g.statut === "Patient Présent") ? "active" : "";

                conteneurTv.innerHTML += `
                    <div class="counter-row ${classeActive}">
                        <div>
                            <div class="counter-name">Guichet 0${i}</div>
                            <div class="counter-status">${g.statut}</div>
                        </div>
                        <div class="counter-ticket">${ticketAffichage}</div>
                    </div>
                `;

                // Si ce guichet est en train d'appeler
                if(g.statut === "Appel en cours" && g.ticket !== "Libre") {
                    guichetPrioritaireId = i;
                    ticketPrioritaireNum = g.ticket;

                    // Génération du jeton unique pour ce guichet précis
                    let idUniqueAppelGuichet = g.ticket + "_G" + i + "_" + (g.force_vocal || "");
                    
                    // CORRECTION ESSENTIELLE : Si ce guichet a changé de ticket ou a recliqué sur "Rappeler",
                    // on joue le son immédiatement sans se soucier du statut des autres guichets !
                    if(derniersIdAppelsParGuichet[i] !== idUniqueAppelGuichet) {
                        derniersIdAppelsParGuichet[i] = idUniqueAppelGuichet;
                        
                        // Récupération instantanée du nom du patient pour l'annoncer
                        db.ref(`file_attente/historique_jours/${dStr}/tickets`).orderByChild('numero').equalTo(g.ticket).once('value', snap => {
                            let nomPatient = "Patient";
                            snap.forEach(c => { nomPatient = c.val().nom; });
                            
                            emettreBipDONG(); 
                            setTimeout(() => {
                                annoncerAuHautParleur(g.ticket, nomPatient, i);
                            }, 650);
                        });
                    }
                } else if (g.statut === "Libre") {
                    // Si le guichet redevient libre, on réinitialise son historique d'appel local
                    derniersIdAppelsParGuichet[i] = "";
                }
            }

            // 2. Affichage principal sur l'écran géant à gauche
            const zoneAppel = document.getElementById("tvCallZone");
            if(guichetPrioritaireId) {
                zoneAppel.classList.remove("empty");
                document.getElementById("tvCallPlaceholder").style.display = "none";
                document.getElementById("tvCallContent").style.display = "block";
                
                document.getElementById("tvTicketNum").textContent = ticketPrioritaireNum;
                document.getElementById("tvCounterNum").textContent = `Guichet 0${guichetPrioritaireId}`;

                db.ref(`file_attente/historique_jours/${dStr}/tickets`).orderByChild('numero').equalTo(ticketPrioritaireNum).once('value', snap => {
                    let nomPatient = "Patient";
                    snap.forEach(c => { nomPatient = c.val().nom; });
                    document.getElementById("tvPatientName").textContent = `Patient : ${nomPatient}`;
                });
            } else {
                zoneAppel.classList.add("empty");
                document.getElementById("tvCallPlaceholder").style.display = "block";
                document.getElementById("tvCallContent").style.display = "none";
            }
        });
    }
</script>
</body>
</html>
